# Knife4j (Swagger) 接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: top.huyuhao.anime.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT 配置
